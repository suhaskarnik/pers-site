<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
  <header id="site-banner">
    <span id="banner-name">Suhas Karnik</span>
    <nav id="banner-links">
      <a href="https://www.linkedin.com/in/suhaskarnik/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://github.com/suhaskarnik" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </header>

  <div id="layout">
    <section id="resume-column">
      <div id="resume-container"></div>
    </section>

    <aside id="chat-panel">
      <div id="chat-header">Ask about exeperience</div>

      <div id="messages"></div>

      <div id="chat-input-zone">
        <div id="preset-chips">
          <button onclick="askPreset('Summarize Kubernetes experience')">Kubernetes experience</button>
          <button onclick="askPreset('Summarize system design experience')">System design</button>
          <button onclick="askPreset('Summarize leadership experience')">Leadership</button>
        </div>
        <div id="input-row">
          <textarea id="question" placeholder="Ask a question..." rows="1"></textarea>
          <button onclick="ask()">Ask</button>
        </div>
        <div id="turnstile-widget" data-sitekey="TURNSTILE_SITE_KEY_PLACEHOLDER"></div>
      </div>
    </aside>
  </div>

  <script src="app.js"></script>
</body>
</html>

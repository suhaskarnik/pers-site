{{ define "main" }}
<div class="resume-layout">
  <div class="resume-content">
    <article class="post-single">
      <header class="post-header">
        <h1 class="post-title">{{ .Title }}</h1>
      </header>
      <div class="post-content md-content">
        {{ .Content }}
      </div>
    </article>
  </div>
  {{- partial "chatbot.html" . }}
</div>
{{ end }}

<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ .Language.LanguageDirection | default "auto" }}">

<head>
    {{- partial "head.html" . }}
</head>

<body class="{{ if .IsHome }}home{{ end }}list" id="top">
    {{- partial "banner.html" . }}
    {{- partial "header.html" . }}
    <main class="main">
        {{- block "main" . }}{{- end }}
    </main>
    {{- partial "footer.html" . }}
</body>

</html>
